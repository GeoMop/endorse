# Configuration of the ZARR-FUSE storage
ATTRS:
    # store_url: "transport.zarr"
    # store_type: 'local'                 # 'guess' type is default
    # STORE_URL: "file://transport.zarr"
    STORE_URL: "transport.zarr"

run_timestamp:
    VARS:
        i_eval:
            unit: "int"
            description: "Unique sample ID given by ordered Salib parameter sequence."
            coords: [ "i_sample", "i_saltelli" ]
        return_code:
            unit: "int"
            description: "Return code from transport wrapper or Flow123d."
            coords: [ "i_sample", "i_saltelli" ]
        eval_time:
            unit: "int"
            description: "Length of each model evaluation computation in seconds."
            coords: [ "i_sample", "i_saltelli" ]
        parameter:
            unit: ""
            description: "Free simulation parameter."
            coords: [ "i_sample", "i_saltelli", "param_name"]
        conc:
            unit: "g/m^3"
            description: "Indicator concentration on a specified grid."
            coords: [ "i_sample", "i_saltelli", "sim_time", "X", "Y", "Z" ]


        i_sample:
            unit: "int"
            description: "Index in independent sample set generated by Quasi Monte Carlo ."
            df_col: None
        i_saltelli:
            unit: "int"
            description: "Index of Saltelli parameter block (A/B/A_Bi/Ai_B)."
            df_col: None
        param_name:
          unit: ""
          description: "Quasi Monte Carlo sub sample for Saltelli schema for Sobol indices."
          df_col: None
        sim_time:
            unit: "year"
            description: "Simulation time."
            df_col: None
        X:
            unit: "m"
            description: "Indicator grid coordinate (x axis)."
            df_col: None
        Y:
            unit: "m"
            description: "Indicator grid coordinate (y axis)."
            df_col: None
        Z:
            unit: "m"
            description: "Indicator grid coordinate (z axis)."
            df_col: None

    COORDS:
        i_sample:
            sorted: False
            chunk_size: 64
            merge: None
        i_saltelli:
            sorted: False
            chunk_size: 16
            merge: None
        param_name:
            sorted: False
            chunk_size: 64
            merge:
                step_limits: None
        sim_time:
            chunk_size: 4
            merge:
                step_limits: None
        X:
            chunk_size: 8
            merge:
                step_limits: None
        Y:
            chunk_size: 16
            merge:
                step_limits: None
        Z:
            chunk_size: 2
            merge:
                step_limits: None

    ATTRS:
        grid_step: [20, 20, 2]
        description:
            "."
