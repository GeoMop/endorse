# Configuration of the ZARR-FUSE storage
ATTRS:
    store_url: "transport.zarr"
    store_type: 'local'                 # 'guess' type is default

run_timestamp:
    VARS:
        sample_id:
            unit: ""
            description: "Unique sample ID given by ordered Salib parameter sequence."
            coords: [ "iid", "qmc" ]
        A_sample:
            unit: "bool"
            description: "Indicator function for parameter of that QMC sample be from the set A (oposed to the set B) of the Saltelli schema."
            coords: [ "qmc", "param_name" ]
        parameter:
            unit: ""
            description: "Free simulation parameter."
            coords: [ "iid", "qmc", "param_name"]
        conc:
            unit: "g/m^3"
            description: "Indicator concentration on a specified grid."
            coords: [ "iid", "qmc", "X", "Y", "Z", "sim_time" ]


        iid:
            unit: "int"
            description: "Independent sample set"
            df_col: None
        qmc:
            unit: "int"
            description: "Quasi Monte Carlo sub sample for Saltelli schema for Sobol indices."
            df_col: None
        X:
            unit: "m"
            description: "Indicator grid coordinate (x axis)."
            df_col: None
        Y:
            unit: "m"
            description: "Indicator grid coordinate (y axis)."
            df_col: None
        Z:
            unit: "m"
            description: "Indicator grid coordinate (z axis)."
            df_col: None
        sim_time:
            unit: "year"
            description: "Simulation time."
            df_col: None

    COORDS:
        iid:
            sorted: False
            chunk_size: 1024
            merge: None
        qmc:
            sorted: False
            chunk_size: 64
            merge: None
        param_name:
            sorted: False
            chunk_size: 64
            merge:
                step_limits: None
        X:
            chunk_size: 1024
            merge:
                step_limits: None
        Y:
            chunk_size: 1024
            merge:
                step_limits: None
        Z:
            chunk_size: 1024
            merge:
                step_limits: None
        sim_time:
            chunk_size: 1024
            merge:
                step_limits: None

    ATTRS:
        grid_step: [20, 20]
        description:
            "."
