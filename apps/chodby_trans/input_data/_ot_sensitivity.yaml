n_samples: 2048 # must be power of 2 due to salib
limit_samples: 128
recompute_failed: False
recompute_done: False
collect_only: False

# if True, it removes sample dir right after the sample is collected
clean_sample_dir: True
# if True, it removes some intermediate files and tar the sample dir
clean_soft_sample_dir: True
compress_sample: False

# mesh_only: False
# make_plots: False

second_order: True
sampler: QMC # Valid: ['QMC', 'MonteCarlo', 'LHS']

# confidence level of the estimated error of sobol indices 
err_est_confidence_level: 0.90
parameters:
  # DFN Geometry group
  dfn_pop_1:
    distr: Population
    # group: dfn_pop
    group: dfn_params
    args: {file: "fr_Bukov_bayes/P30_alpha_minus_pop1.csv"}
    parameters:
      p30: {column: "P30"}
      alpha: {column: "alpha"}

  dfn_pop_2:
    distr: Population
    # group: dfn_pop
    group: dfn_params
    args: {file: "fr_Bukov_bayes/P30_alpha_minus_pop2.csv"}
    parameters:
      p30: {column: "P30"}
      alpha: {column: "alpha"}

  dfn_pop_3:
    distr: Population
    # group: dfn_pop
    group: dfn_params
    args: { file: "fr_Bukov_bayes/P30_alpha_minus_pop3.csv" }
    parameters:
      p30: { column: "P30" }
      alpha: { column: "alpha" }

  dfn_pop_4:
    distr: Population
    # group: dfn_pop
    group: dfn_params
    args: { file: "fr_Bukov_bayes/P30_alpha_minus_pop4.csv" }
    parameters:
      p30: { column: "P30" }
      alpha: { column: "alpha" }

  dfn_pop_5:
    distr: Population
    # group: dfn_pop
    group: dfn_params
    args: { file: "fr_Bukov_bayes/P30_alpha_minus_pop5.csv" }
    parameters:
      p30: { column: "P30" }
      alpha: { column: "alpha" }

  # DFN Transport group
  dfn_pop_1_tr_a: &dfn_pop_tr_a
    distr: LogNormal    #ot_sa.LogNormal
    args: {mean_log10: -8.22, std_log10: 0.6} # log(6×10^(−9)) = -8.22
    # group: dfn_transport
    group: dfn_params
  dfn_pop_2_tr_a: *dfn_pop_tr_a
  dfn_pop_3_tr_a: *dfn_pop_tr_a
  dfn_pop_4_tr_a: *dfn_pop_tr_a
  dfn_pop_5_tr_a: *dfn_pop_tr_a


  # Material group
  bulk_diff_m:
    distr: LogNormal
    args: { mean_log10: -12.698970004336019, std_log10: 0.1 } # log10(2×10^(-13))=-12.698970004336019,
    group: mat_bulk
  bulk_disp_L:
    distr: LogNormal
    # integral length of small fractures approx. 5 m
    args: { mean_log10: -0.3010299956639812, std_log10: 0.15 } # log10(0.5)=-0.3010299956639812,
    group: mat_bulk

  edz_cond_min:
    distr: LogNormal
    args: { mean_log10: -12.522878745280337, std_log10: 0.3 } # log10(3×10^(-13))=-12.522878745280337,
    group: mat_bulk
    path: bulk_field_parametric/cond_min
  # edz_cond_max:
  # # TODO: make it multiple of edz_cond_min
  #   distr: LogNormal
  #   args: { mean_log10: -8, std_log10: 0.3 }
  #   group: mat_edz
  #   path: bulk_field_parametric/cond_max
  edz_cond_mult:
    distr: LogNormal
    args: { mean_log10: 0.5, std_log10: 0.5 } # range 0.1-100: mean_log10: (log10(0.1)+log10(100))/2
    group: mat_edz
    path: bulk_field_parametric/cond_mult
  edz_r:
    distr: TruncatedNormal
    args: [2, 0.15, 1.5, 3]
    group: mat_edz
    path: geometry/edz_radius

  por_min:
    distr: TruncatedNormal
    # for other distributions create flag for using ot_sa.TruncatedDistribution
    args: [0.008, 0.002, 0.001, 0.014]  # mu, std, a, b
    group: mat_bulk
    path: bulk_field_parametric/por_min
  por_mult:
    distr: TruncatedNormal
    # for other distributions create flag for using ot_sa.TruncatedDistribution
    args: [1.25, 0.3, 0.35, 2.15]  # mu, std, a, b
    group: mat_edz
    path: bulk_field_parametric/por_mult


  backfill_por:
    distr: TruncatedNormal
    # for other distributions create flag for using ot_sa.TruncatedDistribution
    args: [0.51, 0.02, 0.45, 0.57]  # mu, std, a, b
    group: mat_backfill
  backfill_cond:
    distr: LogNormal
    args: { mean_log10: -12.397940008672037, std_log10: 0.26 }     # log10(4e-13)
    group: mat_backfill
  backfill_diff_m:
    distr: LogNormal
    args: { mean_log10: -11, std_log10: 0.3 }
    group: mat_backfill
  backfill_disp_L:
    distr: LogNormal
    args: { mean_log10: -1.08, std_log10: 0.15 } # (np.log10(0.026) + np.log10(0.26))/2 = np.float64(-1.085026652029182)
    group: mat_backfill

  dfn_seed: 
    # seed for small fractures
    distr: Seed
    path: fractures/dfn_seed
  meshing_seed: 
    # seed for gmsh fractures
    distr: Seed
    path: mesh/meshing_seed
