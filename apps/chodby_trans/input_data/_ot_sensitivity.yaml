n_samples: 512 # must be power of 2 due to salib
recompute_failed: False
recompute_done: False
collect_only: False

# if True, it removes sample dir right after the sample is collected
clean_sample_dir: True
# if True, it removes some intermediate files and tar the sample dir
clean_soft_sample_dir: True
compress_sample: True

# mesh_only: False
# make_plots: False

second_order: False
sampler: QMC # Valid: ['QMC', 'MonteCarlo', 'LHS']

# confidence level of the estimated error of sobol indices 
err_est_confidence_level: 0.90
parameters:
  # DFN Geometry group
  # type:seed -> ?? bounds: [ 0.1 ] # std = 0.1*<par_mean>
#  p_32_scale:
#    distr: Normal       # ot.Normal(mean, std)
#    args: [1.0, 0.1]
#    group: dfn_geometry
#  power_scale:
#    distr: Normal
#    args: [ 1.0, 0.1 ]
#    group: dfn_geometry
  # DFN transport parameters group by Forsmark
#  tr_a_scale:
#    distr: LogNormal    #ot_sa.LogNormal
#    args: {mean_log10: 0.0, std_log10: 0.5}
#    group: dfn_transport
#  tr_b_scale:
#    distr: Normal
#    args: [1.0, 0.1 ]
#    group: dfn_transport

  dfn_pop_1:
    distr: Population
    group: dfn_geometry
    args: {file: "fr_Bukov_bayes/P30_alpha_minus_pop1.csv"}
    parameters:
      p30: {column: "P30"}
      alpha: {column: "alpha"}

  dfn_pop_2:
    distr: Population
    group: dfn_geometry
    args: {file: "fr_Bukov_bayes/P30_alpha_minus_pop2.csv"}
    parameters:
      p30: {column: "P30"}
      alpha: {column: "alpha"}

  dfn_pop_3:
    distr: Population
    group: dfn_geometry
    args: { file: "fr_Bukov_bayes/P30_alpha_minus_pop3.csv" }
    parameters:
      p30: { column: "P30" }
      alpha: { column: "alpha" }

  dfn_pop_4:
    distr: Population
    group: dfn_geometry
    args: { file: "fr_Bukov_bayes/P30_alpha_minus_pop4.csv" }
    parameters:
      p30: { column: "P30" }
      alpha: { column: "alpha" }

  dfn_pop_5:
    distr: Population
    group: dfn_geometry
    args: { file: "fr_Bukov_bayes/P30_alpha_minus_pop5.csv" }
    parameters:
      p30: { column: "P30" }
      alpha: { column: "alpha" }


  dfn_pop_1_tr_a: &dfn_pop_tr_a
    distr: LogNormal    #ot_sa.LogNormal
    args: {mean_log10: -8.22, std_log10: 0.2} # log(6×10^(−9)) = -8.22
    group: dfn_transport
  dfn_pop_2_tr_a: *dfn_pop_tr_a
  dfn_pop_3_tr_a: *dfn_pop_tr_a
  dfn_pop_4_tr_a: *dfn_pop_tr_a
  dfn_pop_5_tr_a: *dfn_pop_tr_a

  # material parameters
  dispersivity_L:
    distr: LogNormal
    args: { mean_log10: -0.6, std_log10: 0.3 } # log10(0.25)=-0.6,
    group: materials

  edz_cond_min:
    distr: LogNormal
    args: { mean_log10: -12.52, std_log10: 0.3 } # log10(3×10^(-13))=-12.52,
    group: materials
    path: bulk_field_parametric/cond_min
  edz_cond_max:
    distr: LogNormal
    args: { mean_log10: -8, std_log10: 0.3 }
    group: materials
    path: bulk_field_parametric/cond_max

  edz_r:
    distr: Normal
    args: [2.5, 0.25]
    group: materials
    path: geometry/edz_radius

  dfn_macro_seed: 
    # seed for small fractures
    distr: Seed         #ot_sa.Seed
  meshing_seed: 
    # seed for gmsh fractures
    distr: Seed

