n_samples: 512 # must be power of 2 due to salib
recompute_failed: False
recompute_done: False
collect_only: False

# if True, it removes sample dir right after the sample is collected
clean_sample_dir: True
# if True, it removes some intermediate files and tar the sample dir
clean_soft_sample_dir: True
compress_sample: True

# mesh_only: False
# make_plots: False

second_order: False
sampler: sobol

# confidence level of the estimated error of sobol indices 
err_est_confidence_level: 0.90
parameters:
  # DFN Geometry group
  # type:seed -> ?? bounds: [ 0.1 ] # std = 0.1*<par_mean>
  p_32_scale:
    distr: Normal       # ot.Normal(mean, std)
    args: [1.0, 0.1]
    group: dfn_geometry
  power_scale:
    distr: Normal
    args: [ 1.0, 0.1 ]
    group: dfn_geometry
  
  # DFN transport parameters group
  tr_a_scale:
    distr: LogNormal    #ot_sa.LogNormal
    args: {mean_log10: 0.0, std_log10: 0.5}
    group: dfn_transport
  tr_b_scale:
    distr: Normal
    args: [1.0, 0.1 ]
    group: dfn_transport

  # material parameters
  dispersivity_L:
    distr: LogNormal
    args: { mean_log10: -0.6, std_log10: 0.3 } # log10(0.25)=-0.6,
    group: materials

  dfn_macro_seed: 
    # seed for small fractures
    distr: Seed         #ot_sa.Seed
  meshing_seed: 
    # seed for gmsh fractures
    distr: Seed

