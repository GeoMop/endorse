n_samples: 512 # must be power of 2 due to salib
recompute_failed: False
recompute_done: False
collect_only: False

# if True, it removes sample dir right after the sample is collected
clean_sample_dir: True
# if True, it removes some intermediate files and tar the sample dir
clean_soft_sample_dir: True
compress_sample: False

# mesh_only: False
# make_plots: False

second_order: True
sampler: QMC # Valid: ['QMC', 'MonteCarlo', 'LHS']

# confidence level of the estimated error of sobol indices 
err_est_confidence_level: 0.90
parameters:
  # DFN Geometry group
  dfn_pop_1:
    distr: Population
    group: dfn_geometry
    args: {file: "fr_Bukov_bayes/P30_alpha_minus_pop1.csv"}
    parameters:
      p30: {column: "P30"}
      alpha: {column: "alpha"}

  dfn_pop_2:
    distr: Population
    group: dfn_geometry
    args: {file: "fr_Bukov_bayes/P30_alpha_minus_pop2.csv"}
    parameters:
      p30: {column: "P30"}
      alpha: {column: "alpha"}

  dfn_pop_3:
    distr: Population
    group: dfn_geometry
    args: { file: "fr_Bukov_bayes/P30_alpha_minus_pop3.csv" }
    parameters:
      p30: { column: "P30" }
      alpha: { column: "alpha" }

  dfn_pop_4:
    distr: Population
    group: dfn_geometry
    args: { file: "fr_Bukov_bayes/P30_alpha_minus_pop4.csv" }
    parameters:
      p30: { column: "P30" }
      alpha: { column: "alpha" }

  dfn_pop_5:
    distr: Population
    group: dfn_geometry
    args: { file: "fr_Bukov_bayes/P30_alpha_minus_pop5.csv" }
    parameters:
      p30: { column: "P30" }
      alpha: { column: "alpha" }

  # DFN Transport group
  dfn_pop_1_tr_a: &dfn_pop_tr_a
    distr: LogNormal    #ot_sa.LogNormal
    args: {mean_log10: -8.22, std_log10: 0.6} # log(6×10^(−9)) = -8.22
    group: dfn_transport
  dfn_pop_2_tr_a: *dfn_pop_tr_a
  dfn_pop_3_tr_a: *dfn_pop_tr_a
  dfn_pop_4_tr_a: *dfn_pop_tr_a
  dfn_pop_5_tr_a: *dfn_pop_tr_a

  # Material group
  dispersivity_L:
    distr: LogNormal
    args: { mean_log10: -0.6, std_log10: 0.1 } # log10(0.25)=-0.6,
    # group: mat_bulk

  edz_cond_min:
    distr: LogNormal
    args: { mean_log10: -12.52, std_log10: 0.3 } # log10(3×10^(-13))=-12.52,
    group: mat_bulk
    path: bulk_field_parametric/cond_min
  edz_cond_max:
    distr: LogNormal
    args: { mean_log10: -8, std_log10: 0.3 }
    group: mat_edz
    path: bulk_field_parametric/cond_max
  edz_r:
    distr: Normal
    args: [2, 0.15]
    group: mat_edz
    path: geometry/edz_radius

  # por_min:
  #   distr: TruncatedNormal
  #   # TODO: check values
  #   # for other distributions create flag for using ot_sa.TruncatedDistribution
  #   args: [0.002, 0.0003, 0.001, 0.005]  # mu, std, a, b
  #   group: mat_backfill
  #   path: bulk_field_parametric/por_min

  backfill_por:
    distr: TruncatedNormal
    # TODO: check values
    # for other distributions create flag for using ot_sa.TruncatedDistribution
    args: [0.05, 0.01, 0.001, 0.4]  # mu, std, a, b
    group: mat_backfill
  backfill_cond:
    distr: LogNormal
    args: { mean_log10: -13, std_log10: 0.3 }
    group: mat_backfill
  backfill_diff_m:
    distr: LogNormal
    args: { mean_log10: -15, std_log10: 0.3 }
    group: mat_backfill

  dfn_macro_seed: 
    # seed for small fractures
    distr: Seed
    group: dfn_geometry
  meshing_seed: 
    # seed for gmsh fractures
    distr: Seed
